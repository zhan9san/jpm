name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Guard: tag version must match Cargo.toml version ──────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v0.2.0
          CARGO="${TAG#v}"                   # strip leading 'v' → 0.2.0
          ACTUAL=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$CARGO" != "$ACTUAL" ]; then
            echo "Tag $TAG does not match Cargo.toml version $ACTUAL"
            exit 1
          fi

  # ── Build binaries for all targets ─────────────────────────────────────────
  build:
    name: Build / ${{ matrix.target }}
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # ── Linux ARM64 ───────────────────────────────────────────────
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          # ── macOS Intel ───────────────────────────────────────────────
          - os: macos-15-intel
            target: x86_64-apple-darwin

          # ── macOS Apple Silicon ────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin

          # ── Windows x86_64 ────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}
        shell: bash

      # ── Package: Unix (.tar.gz) ──────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="jpm-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" jpm
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      # ── Package: Windows (.zip) ──────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "jpm-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target\${{ matrix.target }}\release\jpm.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            jpm-*
          if-no-files-found: error

  # ── Create GitHub release ──────────────────────────────────────────────────
  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          working_directory: dist
          files: |
            *.tar.gz
            *.zip
            *.sha256
          generate_release_notes: true
          make_latest: "true"
          fail_on_unmatched_files: true
