name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly smoke test against the live Jenkins Update Center (Monday 06:00 UTC).
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --locked -- -D warnings

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Docs lint ──────────────────────────────────────────────────────────────
  docs:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        run: npx --yes markdownlint-cli "docs/**/*.md" "README.md"

  # ── Weekly smoke test (live UC) ────────────────────────────────────────────
  # Runs only on the weekly schedule — not on push/PR — so a live UC outage or
  # API change is caught without blocking developer workflows.
  smoke:
    name: Smoke test (live UC)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Run jpm lock against live Update Center
        run: |
          ./target/debug/jpm lock \
            -j 2.452.4 \
            -f plugins.txt \
            -o /tmp/smoke-lock.txt \
            --skip-bundled \
            --fix
          echo "--- Lock file ---"
          cat /tmp/smoke-lock.txt
          plugin_count=$(grep -c '^[^#]' /tmp/smoke-lock.txt || true)
          echo "Resolved ${plugin_count} plugin(s)"
          [ "$plugin_count" -gt 0 ]
